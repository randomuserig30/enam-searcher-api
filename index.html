<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <script>(function(){var t=localStorage.getItem('enam-theme');if(t==='light'){document.documentElement.setAttribute('data-theme','light')}else if(t==='system'){if(!window.matchMedia('(prefers-color-scheme: dark)').matches){document.documentElement.setAttribute('data-theme','light')}}})();</script>
    <title>Enam Searcher</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="login-body">

    <div class="login-bg"></div>

    <div class="login-wrap">
        <div class="login-left">
            <a href="#" class="login-logo">
                <i class="fas fa-bolt"></i>
                <span>Enam<span class="logo-accent"> Searcher</span></span>
            </a>
            <h1 class="login-title">Search across billions<br>of indexed records.</h1>
            <p class="login-sub">Cross-reference identities, credentials, and identifiers across breach data, Discord, and gaming platforms.</p>
            <div class="login-badges">
                <span class="login-badge"><i class="fas fa-database"></i> 2.4B records</span>
                <span class="login-badge"><i class="fas fa-shield-halved"></i> 482 sources</span>
                <span class="login-badge"><i class="fas fa-bolt"></i> &lt; 200ms</span>
            </div>
        </div>

        <div class="login-right">
            <div class="login-card">
                <div class="login-tabs">
                    <button class="login-tab active" data-form="signin">Sign in</button>
                    <button class="login-tab" data-form="signup">Create account</button>
                </div>

                <form class="login-form active" id="signinForm">
                    <div class="login-field">
                        <label>Email</label>
                        <input type="email" id="siEmail" placeholder="you@example.com" required>
                    </div>
                    <div class="login-field">
                        <label>Password</label>
                        <input type="password" id="siPassword" placeholder="Enter your password" required>
                    </div>
                    <button type="submit" class="login-submit">Sign in <i class="fas fa-arrow-right"></i></button>
                </form>

                <form class="login-form" id="signupForm">
                    <div class="login-field">
                        <label>Email</label>
                        <input type="email" id="suEmail" placeholder="you@example.com" required>
                    </div>
                    <div class="login-field">
                        <label>Password</label>
                        <input type="password" id="suPassword" placeholder="Create a password" required minlength="6">
                    </div>
                    <button type="submit" class="login-submit">Create account <i class="fas fa-arrow-right"></i></button>
                </form>

                <div class="login-msg" id="loginMsg"></div>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        const tabs = document.querySelectorAll(".login-tab");
        const forms = document.querySelectorAll(".login-form");
        const msg = document.getElementById("loginMsg");

        tabs.forEach(tab => {
            tab.addEventListener("click", () => {
                tabs.forEach(t => t.classList.remove("active"));
                forms.forEach(f => f.classList.remove("active"));
                tab.classList.add("active");
                document.getElementById(tab.dataset.form + "Form").classList.add("active");
                msg.textContent = "";
                msg.className = "login-msg";
            });
        });

        function showMsg(text, isError) {
            msg.textContent = text;
            msg.className = "login-msg " + (isError ? "error" : "success");
        }
    </script>
    <script type="module">
        import { loginUser, registerUser } from "./auth.js";

        document.getElementById("signinForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const email = document.getElementById("siEmail").value.trim();
            const password = document.getElementById("siPassword").value;
            try {
                await loginUser(email, password);
                window.location.replace("dashboard.html");
            } catch (err) {
                showMsg(err.message || "Invalid email or password.", true);
            }
        });

        document.getElementById("signupForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const email = document.getElementById("suEmail").value.trim();
            const password = document.getElementById("suPassword").value;
            if (password.length < 6) {
                showMsg("Password must be at least 6 characters.", true);
                return;
            }
            try {
                await registerUser(email, password);
                window.location.replace("setup.html");
            } catch (err) {
                showMsg(err.message || "Could not create account.", true);
            }
        });
    </script>
</body>
</html>
